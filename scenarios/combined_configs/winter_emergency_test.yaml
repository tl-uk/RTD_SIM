# =============================================================================
# Scenario Configuration: Winter Emergency Response
# =============================================================================

name: Winter Emergency Response
description: Test weather-responsive policies during severe winter conditions

base_scenarios:
  - complete_supply_chain_electrification  # contains depot_based_electrification
  - depot_based_electrification            # base for EV adoption

interaction_rules:
  # Rule 1: Early trigger for EV subsidy increase (WILL WORK with more EVs)
  - condition: "step > 20"
    action: increase_ev_subsidy
    parameters:
      multiplier: 1.2
    priority: 100
  
  # Rule 2: Grid stress (WILL WORK with more EVs)
  - condition: "grid_utilization > 0.60"  # Lower threshold from 0.80
    action: apply_surge_pricing
    parameters:
      multiplier: 2.0
    priority: 90
  
  # Rule 3: Moderate charger load (WILL WORK)
  - condition: "charger_utilization > 0.50"  # Lower from 0.90
    action: add_emergency_chargers
    parameters:
      num_chargers: 5
    priority: 80
  
  # Rule 4: Cold weather protocols (WILL WORK)
  - condition: "step > 30"  # Remove ice_warning dependency
    action: enable_winter_protocols
    parameters:
      reduce_ev_range: true
    priority: 70

constraints:
  - type: grid_capacity
    limit: 1000000  # 1 MW in W
    warning_threshold: 0.60  # Lower from 0.80

  - type: budget
    limit: 5000000
    warning_threshold: 0.70  # Lower from 0.80

feedback_loops: []