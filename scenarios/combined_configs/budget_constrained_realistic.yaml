# =============================================================================
# scenarios/combined_configs/budget_constrained_realistic.yaml
# =============================================================================
# Government faces realistic budget constraints and must prioritize

name: Budget-Constrained Realistic Transition
description: |
  Limited government budget requires tough choices. Models real-world trade-offs
  between subsidies, infrastructure, and cost recovery.

base_scenarios:
  - tiered_freight_transition
  - workplace_charging_incentive

interaction_rules:
  # Budget check before any infrastructure spending
  - condition: "step % 25 == 0"
    action: add_emergency_chargers
    parameters:
      num_chargers: 5  # Small increments
      strategy: equitable
    priority: 50

  # Phase out subsidies after budget 70% depleted
  - condition: "step > 60"
    action: reduce_ev_subsidy
    parameters:
      reduction_percentage: 10  # 10% reduction every trigger
    priority: 80

  # Increase cost recovery pressure
  - condition: "charger_utilization < 0.4 and step > 40"
    action: increase_charging_cost
    parameters:
      reason: infrastructure_cost_recovery
    priority: 70

constraints:
  - type: budget
    limit: 25000000  # £25M - tight budget
    warning_threshold: 0.7

  - type: grid_capacity
    limit: 800  # Limited grid capacity
    warning_threshold: 0.80

  - type: deployment_rate
    limit: 2000  # Slow deployment (2000/year)
    warning_threshold: 0.85

feedback_loops:
  - name: subsidy_depletion_slowdown
    description: As subsidies deplete, adoption slows, infrastructure underutilized
    variables: [budget_remaining, ev_adoption, charger_utilization]
    loop_type: negative
    strength: 1.3

  - name: cost_recovery_pressure
    description: Need to recover costs increases prices, further slowing adoption
    variables: [infrastructure_capex, charger_utilization, charging_cost]
    loop_type: negative
    strength: 1.1

expected_outcomes:
  van_electric_adoption: 0.35
  truck_electric_adoption: 0.20
  total_emissions_reduction: 0.25
  budget_exhaustion_step: 75
  cost_recovery_achieved: false
