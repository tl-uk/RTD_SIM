# RTD_SIM User Personas
# 18 fully-specified personas for story-driven BDI agent generation
# Location: agent/personas/personas.yaml
#
# STRUCTURE NOTE: All personas MUST be at the top level (no nesting).
# The 5 multi-modal personas (long_distance_commuter, island_resident,
# business_traveler, accessibility_user, tourist_visitor) were previously
# incorrectly nested inside delivery_driver due to indentation error — FIXED.
#
# MODE NAME FIX (2026-03-21):
#   All mode names now use the canonical strings from transit_passenger.yaml.
#   Previous migration left blank YAML keys that parsed as None — now all
#   values are explicit. Duplicate keys collapsed to highest value.
#   Non-standard modes corrected:
#     accessible_bus → bus
#     flight         → flight_domestic
#     ebike          → bike
#     train          → local_train (short-range) or intercity_train (long-range)
#     car_petrol / car_diesel / taxi → car  (take highest of the merged values)
#     car_ev         → ev
#     community_transport → bus
#     rental_ev      → ev
#     tour_bus       → bus
#
# Persona groups:
#   Core passenger (9):    eco_warrior, concerned_parent, budget_student,
#                          business_commuter, disabled_commuter, rural_resident,
#                          shift_worker, tourist, delivery_driver (gig)
#   Freight (1):           freight_operator
#   DFT segments (3):      retired_commuter, frequent_driver, elderly_non_driver
#   Multi-modal (5):       long_distance_commuter, island_resident,
#                          business_traveler, accessibility_user, tourist_visitor

# ============================================================================
# CORE PASSENGER PERSONAS
# ============================================================================

eco_warrior:
  narrative: |
    As an environmental concious commuter, I want to minimize my carbon footprint
    in all my travel decisions so that I can contribute to climate action
    and inspire others in my community.

  persona_type: "passenger"

  desires:
    eco: 0.9
    time: 0.3
    cost: 0.4
    comfort: 0.2
    safety: 0.5
    reliability: 0.6
    flexibility: 0.7

  desire_variance: 0.10

  beliefs:
    - text: "Public transport significantly reduces carbon emissions"
      strength: 0.9
      updateable: true
    - text: "Cycling is healthy and sustainable"
      strength: 0.85
      updateable: true
    - text: "EVs are better than petrol cars but active transport is best"
      strength: 0.7
      updateable: true

  constraints:
    - "Avoid petrol/diesel vehicles when possible"
    - "Prefer active transport when distance < 5km"

  mode_preferences:
    walk: 0.8
    bike: 0.9          # was ebike 0.85 — take higher of ebike(0.85) and bike (was separate entry 0.9)
    bus: 0.7
    local_train: 0.75  # was train
    ev: 0.5
    car: 0.1           # was car_petrol 0.1 and car_diesel 0.1 — same value, collapsed

  plan_hints:
    - "Willing to combine modes (bike + train)"
    - "Accepts longer travel time for lower emissions"
    - "Influenced by peer behavior"

  social_profile:
    influence_susceptibility: 0.7
    influence_strength: 0.8
    network_size_range: [10, 30]


concerned_parent:
  narrative: |
    As a concerned parent living in a residential area, I want to reduce
    my family's carbon footprint during the daily school run so that I can
    contribute to local decarbonization efforts and set a positive example
    for my children.

  persona_type: "passenger"

  desires:
    safety: 0.95
    reliability: 0.9
    eco: 0.7
    time: 0.6
    comfort: 0.5
    cost: 0.5
    flexibility: 0.3

  desire_variance: 0.08

  beliefs:
    - text: "Children's safety comes first"
      strength: 1.0
      updateable: false
    - text: "Walking/cycling to school teaches good habits"
      strength: 0.8
      updateable: true
    - text: "Active school runs improve children's health"
      strength: 0.75
      updateable: true

  constraints:
    - "No mode switches with children present"
    - "Must arrive at school within time window"
    - "Weather-dependent cycling (rain threshold)"

  mode_preferences:
    walk: 0.8
    bike: 0.7
    ev: 0.6            # was car_ev
    bus: 0.5
    car: 0.3           # was car_petrol

  plan_hints:
    - "Route must avoid busy roads when cycling"
    - "Prefers familiar, low-traffic routes"
    - "May carpool with neighbors"

  social_profile:
    influence_susceptibility: 0.6
    influence_strength: 0.7
    network_size_range: [5, 15]


budget_student:
  narrative: |
    As a university student on a tight budget, I need affordable transport
    options for getting to campus and social activities so that I can manage
    my limited finances while maintaining an active social life.

  persona_type: "passenger"

  desires:
    cost: 0.95
    time: 0.4
    eco: 0.5
    comfort: 0.3
    safety: 0.6
    reliability: 0.5
    flexibility: 0.8

  desire_variance: 0.12

  beliefs:
    - text: "Walking and cycling save money"
      strength: 0.9
      updateable: false
    - text: "Student discounts make public transport affordable"
      strength: 0.8
      updateable: true
    - text: "Owning a car is financially irresponsible for students"
      strength: 0.7
      updateable: true

  constraints:
    - "Maximum daily transport budget: £5"
    - "Free transport options highly preferred"

  mode_preferences:
    walk: 0.95
    bike: 0.9           # ebike(0.5) and bike were separate — bike higher
    bus: 0.7
    local_train: 0.6    # was train
    car: 0.1            # was car_petrol

  plan_hints:
    - "Willing to walk long distances to save money"
    - "Uses bike-sharing or borrowed bikes"
    - "Flexible with time to get cheaper fares"

  social_profile:
    influence_susceptibility: 0.8
    influence_strength: 0.5
    network_size_range: [15, 40]


business_commuter:
  narrative: |
    As a senior professional with a demanding schedule, I need reliable and
    comfortable transport that minimizes disruption to my work so that I can
    maintain productivity and meet client commitments.

  persona_type: "passenger"

  desires:
    time: 0.9
    reliability: 0.95
    comfort: 0.8
    safety: 0.7
    cost: 0.4
    eco: 0.5
    flexibility: 0.3

  desire_variance: 0.08

  beliefs:
    - text: "Time is money in business"
      strength: 0.95
      updateable: false
    - text: "First-class travel is a productivity investment"
      strength: 0.8
      updateable: true
    - text: "Video calls can replace some travel"
      strength: 0.6
      updateable: true

  constraints:
    - "Must arrive on time for meetings"
    - "Requires mobile connectivity during travel"
    - "Professional appearance on arrival"

  mode_preferences:
    intercity_train: 0.9  # was train_first_class
    ev: 0.8               # was car_ev
    car: 0.7              # was taxi(0.7) and car_petrol(0.6) — take highest
    bus: 0.3
    bike: 0.1

  plan_hints:
    - "Values predictability over cost"
    - "Willing to pay premium for time savings"
    - "Uses travel time for work"

  social_profile:
    influence_susceptibility: 0.4
    influence_strength: 0.6
    network_size_range: [8, 20]


disabled_commuter:
  narrative: |
    As a person with mobility challenges, I need accessible and reliable
    transport options that accommodate my wheelchair so that I can maintain
    independence and participate fully in work and community life.

  persona_type: "passenger"

  desires:
    accessibility: 0.95
    reliability: 0.9
    safety: 0.85
    comfort: 0.7
    time: 0.5
    cost: 0.6
    eco: 0.4

  desire_variance: 0.06

  beliefs:
    - text: "Accessible transport is a right, not a privilege"
      strength: 1.0
      updateable: false
    - text: "Many public transport options lack proper accessibility"
      strength: 0.8
      updateable: true
    - text: "Door-to-door services provide dignity"
      strength: 0.85
      updateable: true

  constraints:
    - "Requires wheelchair accessible vehicles"
    - "Cannot use stairs or steep inclines"
    - "May need assistance boarding"

  mode_preferences:
    car: 0.9            # was accessible_taxi — highest value retained
    bus: 0.8            # was community_transport(0.8) > accessible_bus(0.7) — take highest
    local_train: 0.5    # was train
    walk: 0.2
    bike: 0.0

  plan_hints:
    - "Pre-booking often required"
    - "Route must have level access"
    - "Longer journey times accepted for accessibility"

  social_profile:
    influence_susceptibility: 0.5
    influence_strength: 0.7
    network_size_range: [5, 15]


rural_resident:
  narrative: |
    As someone living in a rural area with limited public transport, I need
    practical transport solutions for essential trips to town so that I can
    access services, employment, and maintain social connections.

  persona_type: "passenger"

  desires:
    reliability: 0.85
    flexibility: 0.8
    cost: 0.7
    time: 0.6
    safety: 0.7
    eco: 0.5
    comfort: 0.5

  desire_variance: 0.12

  beliefs:
    - text: "Car ownership is essential in rural areas"
      strength: 0.9
      updateable: true
    - text: "Public transport serves rural areas poorly"
      strength: 0.85
      updateable: true
    - text: "Community car-sharing could work"
      strength: 0.6
      updateable: true

  constraints:
    - "Limited public transport availability"
    - "Long distances to services"
    - "Weather conditions affect travel"

  mode_preferences:
    car: 0.8            # was car_petrol
    ev: 0.7             # was car_ev
    bus: 0.6            # was community_transport(0.6) > bus(0.4) — take highest
    bike: 0.3
    walk: 0.2

  plan_hints:
    - "Combines trips to minimize journeys"
    - "Shares rides with neighbors when possible"
    - "EV adoption limited by charging infrastructure"

  social_profile:
    influence_susceptibility: 0.6
    influence_strength: 0.6
    network_size_range: [10, 25]


shift_worker:
  narrative: |
    As a healthcare worker doing rotating shifts including nights, I need
    flexible transport that works at all hours so that I can get to work
    safely regardless of the time and weather conditions.

  persona_type: "passenger"

  desires:
    reliability: 0.9
    safety: 0.85
    flexibility: 0.8
    time: 0.7
    cost: 0.6
    comfort: 0.5
    eco: 0.4

  desire_variance: 0.10

  beliefs:
    - text: "Night-time public transport is unreliable"
      strength: 0.8
      updateable: true
    - text: "Personal safety is paramount during night shifts"
      strength: 0.95
      updateable: false
    - text: "Cycling at night is risky"
      strength: 0.7
      updateable: true

  constraints:
    - "Must work night shifts (22:00-06:00)"
    - "Limited public transport at night"
    - "Safety concerns in dark hours"

  mode_preferences:
    car: 0.8            # was car_petrol(0.8) and taxi(0.6) — take highest
    ev: 0.75            # was car_ev
    bus: 0.4
    bike: 0.2
    walk: 0.1

  plan_hints:
    - "Prefers direct routes at night"
    - "Avoids poorly lit areas"
    - "May carpool with colleagues"

  social_profile:
    influence_susceptibility: 0.5
    influence_strength: 0.5
    network_size_range: [8, 20]


tourist:
  narrative: |
    As a tourist visiting Scotland, I want to explore cities and countryside
    using sustainable transport options so that I can have an authentic
    experience while minimizing my environmental impact.

  persona_type: "passenger"

  desires:
    experience: 0.9
    eco: 0.7
    flexibility: 0.85
    comfort: 0.6
    safety: 0.7
    time: 0.4
    cost: 0.5

  desire_variance: 0.15

  beliefs:
    - text: "Sustainable tourism is responsible tourism"
      strength: 0.8
      updateable: true
    - text: "Public transport offers authentic local experience"
      strength: 0.75
      updateable: true
    - text: "Scenic routes are worth extra time"
      strength: 0.9
      updateable: false

  constraints:
    - "Unfamiliar with local transport systems"
    - "Carrying luggage affects mode choice"
    - "Limited local knowledge"

  mode_preferences:
    local_train: 0.9    # was train
    bus: 0.8            # was bus(0.8) and tour_bus(0.6) — take highest
    walk: 0.85
    bike: 0.7
    ev: 0.5             # was rental_ev

  plan_hints:
    - "Prefers scenic routes over fastest"
    - "Values local recommendations"
    - "Willing to try new transport modes"

  social_profile:
    influence_susceptibility: 0.7
    influence_strength: 0.4
    network_size_range: [2, 10]


# ============================================================================
# FREIGHT PERSONAS
# ============================================================================

freight_operator:
  narrative: |
    As a freight operator facing strict government mandates, I need to
    integrate cost-effective decarbonization strategies into my logistics
    planning so that I can maintain regulatory compliance, ensure operational
    efficiency, and continue to provide timely and reliable delivery services.

  persona_type: "freight"

  desires:
    compliance: 0.95
    cost: 0.85
    reliability: 0.9
    time: 0.8
    eco: 0.6
    flexibility: 0.5
    safety: 0.75

  desire_variance: 0.10

  beliefs:
    - text: "EV trucks reduce long-term operational costs"
      strength: 0.7
      updateable: true
    - text: "Multimodal transport increases complexity"
      strength: 0.6
      updateable: true
    - text: "Compliance failures have severe penalties"
      strength: 1.0
      updateable: false
    - text: "Route optimization directly impacts profitability"
      strength: 0.9
      updateable: false

  constraints:
    - "Must meet emission standards"
    - "Delivery time windows must be honored"
    - "Vehicle capacity limits"
    - "Driver hours regulations"

  mode_preferences:
    truck_electric: 0.8   # was ev_truck
    truck_diesel: 0.4     # was diesel_truck
    local_train: 0.6      # was rail_freight — proxy until freight_rail mode added
    hgv_electric: 0.7
    hgv_diesel: 0.5
    van_electric: 0.65

  plan_hints:
    - "Optimize routes for fuel/charge efficiency"
    - "Consider rail for distances > 200km"
    - "Consolidate deliveries to reduce trips"
    - "Charging infrastructure availability critical"

  freight_params:
    vehicle_types: ["ev_truck_3.5t", "ev_truck_7.5t", "diesel_truck_12t"]
    typical_load_factor: [0.5, 0.9]
    max_range_km: 250

  social_profile:
    influence_susceptibility: 0.5
    influence_strength: 0.6
    network_size_range: [5, 15]


delivery_driver:
  narrative: |
    As a gig economy delivery driver using my own vehicle, I need to balance
    earnings with vehicle costs so that I can maintain profitability while
    meeting customer expectations for fast delivery.

  persona_type: "freight"

  desires:
    cost: 0.9
    time: 0.85
    reliability: 0.8
    flexibility: 0.75
    eco: 0.3
    comfort: 0.4
    safety: 0.6

  desire_variance: 0.12

  beliefs:
    - text: "Time is money in gig economy"
      strength: 0.95
      updateable: false
    - text: "EVs have lower running costs but high upfront cost"
      strength: 0.7
      updateable: true
    - text: "Customer ratings depend on speed"
      strength: 0.85
      updateable: true

  constraints:
    - "Must maximize deliveries per hour"
    - "Vehicle running costs directly impact earnings"
    - "Customer ratings affect future work"

  mode_preferences:
    bike: 0.8           # was ebike(0.8) and bike(0.4) — take highest
    e_scooter: 0.75     # was scooter_electric
    cargo_bike: 0.7
    van_electric: 0.5
    car: 0.6            # was car_petrol
    ev: 0.5             # was car_ev

  plan_hints:
    - "Optimizes routes for maximum deliveries"
    - "Considers parking availability"
    - "Weather affects mode choice (bike vs car)"

  freight_params:
    vehicle_types: ["ebike", "scooter_electric", "car_small"]
    typical_load_factor: [0.3, 0.7]
    max_range_km: 50

  social_profile:
    influence_susceptibility: 0.6
    influence_strength: 0.5
    network_size_range: [10, 30]


# ============================================================================
# DFT SEGMENT PERSONAS (UK Dept for Transport "Meet the Personas" pack)
# Segments: 4 (Jeff/comfortable empty-nester), 6 (Oliver/heavy car user),
#           7 (Peter & Pippa/elderly low income)
# ============================================================================

retired_commuter:
  narrative: |
    As a recently retired professional (DFT segment 4: Jeff/comfortable empty-nester),
    I enjoy leisurely travel and want to use public transport for day trips and social
    activities. I have time flexibility but care about comfort and moderate cost, and
    I'm genuinely interested in reducing my carbon footprint now that I'm no longer
    commuting daily.

  persona_type: "passenger"

  desires:
    eco: 0.7
    time: 0.3
    cost: 0.6
    comfort: 0.75
    safety: 0.8
    reliability: 0.7
    flexibility: 0.7

  desire_variance: 0.10

  beliefs:
    - text: "I have time to take the scenic route — rushing is for working life"
      strength: 0.85
      updateable: true
    - text: "Public transport is sociable and keeps me connected"
      strength: 0.7
      updateable: true
    - text: "My car is convenient but I use it less than I used to"
      strength: 0.75
      updateable: true

  constraints:
    - "No fixed schedule — time flexibility is high"
    - "Comfort preferred over speed"
    - "May avoid transport at very late hours"

  mode_preferences:
    local_train: 0.85   # was train
    bus: 0.8
    walk: 0.7
    ev: 0.5             # was car_ev
    car: 0.5            # was taxi(0.5) and car_petrol(0.45) — take highest
    bike: 0.3

  plan_hints:
    - "Willing to use off-peak services for cheaper fares"
    - "Prefers seated, comfortable journeys"
    - "May combine rail + walk for day trips"
    - "Interested in coach travel for longer distances"

  social_profile:
    influence_susceptibility: 0.55
    influence_strength: 0.5
    network_size_range: [8, 20]


frequent_driver:
  narrative: |
    As a suburban family driver (DFT segment 6: Oliver/heavy car user),
    I drive for almost everything — work, school runs, shopping, leisure.
    My car is central to my identity and family logistics, but I'm pragmatically
    open to EVs to reduce running costs and I'll consider greener options
    when they're genuinely more convenient.

  persona_type: "passenger"

  desires:
    time: 0.85
    comfort: 0.75
    reliability: 0.85
    cost: 0.6
    eco: 0.45
    flexibility: 0.7
    safety: 0.8

  desire_variance: 0.10

  beliefs:
    - text: "The car is the most practical option for my family's schedule"
      strength: 0.9
      updateable: true
    - text: "Public transport doesn't work for the school run"
      strength: 0.8
      updateable: true
    - text: "An EV would save money on fuel in the long run"
      strength: 0.65
      updateable: true
    - text: "Cycling is fine for some but not for my trips"
      strength: 0.7
      updateable: true

  constraints:
    - "Multiple stops often required in one trip"
    - "School run timing is fixed"
    - "Needs to carry family and cargo regularly"

  mode_preferences:
    car: 0.85           # was car_petrol(0.85) and car_diesel(0.65) — take highest
    ev: 0.75            # was car_ev
    bus: 0.25
    local_train: 0.35   # was train
    bike: 0.15
    walk: 0.2

  plan_hints:
    - "Rarely considers alternatives to car"
    - "EV adoption would be triggered by cost savings or incentives"
    - "Low-emission zone penalties could shift behaviour"
    - "Strong habit inertia — needs significant nudge to change"

  social_profile:
    influence_susceptibility: 0.45
    influence_strength: 0.5
    network_size_range: [10, 25]


elderly_non_driver:
  narrative: |
    As an elderly person who has stopped driving (DFT segment 7: Peter/Pippa),
    I depend entirely on public transport, community transport, and family support.
    I am on a fixed income, so cost matters greatly. Accessibility, safety, and
    reliability are non-negotiable — without them I lose my independence entirely.

  persona_type: "passenger"

  desires:
    accessibility: 0.95
    safety: 0.92
    reliability: 0.88
    cost: 0.8
    comfort: 0.65
    time: 0.3
    eco: 0.45

  desire_variance: 0.06

  beliefs:
    - text: "Without good bus services I am isolated"
      strength: 0.95
      updateable: false
    - text: "Timetables and routes must be easy to understand"
      strength: 0.9
      updateable: false
    - text: "I worry about falls and being stranded"
      strength: 0.85
      updateable: true
    - text: "Community transport fills gaps that buses miss"
      strength: 0.75
      updateable: true

  constraints:
    - "No longer drives — entirely dependent on other modes"
    - "Fixed income: cost is a real barrier"
    - "Mobility limitations — cannot walk far or carry heavy bags"
    - "Needs step-free access or very low floor boarding"

  mode_preferences:
    bus: 0.9            # was community_transport(0.9) and bus(0.85) — take highest
    car: 0.75           # was accessible_taxi(0.75) and car_petrol(0.0) — take highest
    local_train: 0.55   # was train
    walk: 0.35
    bike: 0.0

  plan_hints:
    - "Relies on concessionary bus pass"
    - "Prefers routes with seats available"
    - "Avoids travel during dark hours or bad weather"
    - "Needs simple, predictable journeys"

  social_profile:
    influence_susceptibility: 0.5
    influence_strength: 0.4
    network_size_range: [3, 12]


# ============================================================================
# MULTI-MODAL PERSONAS
# FIX: These were previously incorrectly nested inside delivery_driver
# due to a YAML indentation bug. They are now correctly at the top level.
# ============================================================================

long_distance_commuter:
  narrative: |
    As a professional who commutes daily between Edinburgh and Glasgow (80 km),
    I want reliable intercity rail with productive journey time so that I can
    avoid the cost and stress of city-centre parking while staying connected
    during travel.

  persona_type: "passenger"

  desires:
    time: 0.7
    cost: 0.55
    comfort: 0.8
    eco: 0.65
    reliability: 0.9
    flexibility: 0.4
    productivity: 0.9

  desire_variance: 0.10

  beliefs:
    - text: "Train is more productive than driving for long commutes"
      strength: 0.85
      updateable: true
    - text: "Parking in city centre is expensive and stressful"
      strength: 0.9
      updateable: true
    - text: "I can work effectively on the train"
      strength: 0.85
      updateable: true
    - text: "Rail delays cascade badly into my working day"
      strength: 0.8
      updateable: true

  constraints:
    - "Must catch scheduled train to arrive by 9am"
    - "Need reliable return service after 5pm"
    - "Long walking distances at either end are impractical"

  mode_preferences:
    local_train: 0.95   # was train
    intercity_train: 0.9
    ev: 0.5             # was car_ev
    bus: 0.3
    car: 0.2            # was car_petrol

  plan_hints:
    - "Combines walk/bike/taxi for first/last mile"
    - "Season ticket economics drive mode lock-in"
    - "Rail disruption triggers car use as fallback"
    - "Remote working reduces commute frequency"

  social_profile:
    influence_susceptibility: 0.5
    influence_strength: 0.6
    network_size_range: [8, 20]


island_resident:
  narrative: |
    As a Scottish island resident, I must plan all mainland trips around
    ferry schedules and weather conditions so that I can access essential
    services, work opportunities, and family connections while managing
    the unpredictability and cost of island living.

  persona_type: "passenger"

  desires:
    reliability: 0.95
    cost: 0.8
    flexibility: 0.3
    eco: 0.7
    time: 0.4
    safety: 0.85
    comfort: 0.5

  desire_variance: 0.12

  beliefs:
    - text: "Ferry schedules dictate my entire life"
      strength: 1.0
      updateable: false
    - text: "Weather delays are unavoidable — I plan for them"
      strength: 0.9
      updateable: false
    - text: "Electric ferries would reduce emissions and local air quality"
      strength: 0.8
      updateable: true
    - text: "Missing the last ferry means staying overnight"
      strength: 1.0
      updateable: false

  constraints:
    - "Must book ferry in advance — no walk-on guarantee"
    - "Weather-dependent: services can be cancelled"
    - "Car essential on island — no alternative for local trips"

  mode_preferences:
    ferry_diesel: 0.95  # was ferry
    ferry_electric: 0.9
    car: 0.8            # was car_petrol
