# RTD_SIM Job Contexts - Unified Format
# Phase 4.5F: Expanded freight modes with proper BDI story structure

# ============================================================================
# MICRO-DELIVERY (Last-Mile Urban)
# ============================================================================

urban_food_delivery:
  context: "When delivering food orders in dense urban areas during peak hours"
  goal: "I want to complete maximum deliveries per hour efficiently"
  outcome: "So I can maximize earnings and maintain customer ratings"
  
  job_type: "gig_delivery"
  
  delivery_params:
    num_stops: [5, 15]
    stop_duration_min: [2, 5]
    route_optimization: "maximize_deliveries_per_hour"
    dynamic_routing: true
  
  time_window:
    start: "11:00"
    end: "23:00"
    flexibility: "medium"
    peak_hours: ["12:00-14:00", "18:00-21:00"]
  
  destination_type: "multiple_urban"
  typical_distance_km: [5, 10]
  
  parameters:
    vehicle_required: true
    cargo_capacity: false
    vehicle_type: micro_mobility  #← Checked first
    recurring: true
    urgency: high
    time_sensitive: true
  
  vehicle_constraints:
    type: micro_mobility  # ← Also checked as fallback
    max_distance_km: 10
    preferred_modes: ['cargo_bike', 'bike']
  
  desire_overrides:
    time: 0.9
    cost: 0.2
  
  plan_context:
    - "Speed is critical for customer satisfaction"
    - "Multiple short stops require quick parking"
    - "Weather affects cargo bike safety"
    - "Peak hours have surge pricing"
    - "Battery/range management crucial"
  
  csv_columns:
    required: ["origin_lat", "origin_lon", "dest_lat", "dest_lon"]
    optional: ["delivery_window", "customer_rating_impact", "surge_multiplier"]

urban_parcel_delivery:
  context: "When delivering parcels in city center with tight delivery windows"
  goal: "I want reliable transport that handles packages safely"
  outcome: "So I meet delivery commitments and avoid failed deliveries"
  
  job_type: "delivery"
  
  delivery_params:
    num_stops: [8, 20]
    stop_duration_min: [3, 8]
    route_optimization: "time_then_cost"
    dynamic_routing: false
  
  time_window:
    start: "08:00"
    end: "18:00"
    flexibility: "low"
  
  destination_type: "multiple_urban"
  typical_distance_km: [10, 15]
  
  parameters:
    vehicle_required: true
    cargo_capacity: false
    vehicle_type: micro_mobility
    recurring: true
    urgency: medium
  
  vehicle_constraints:
    type: micro_mobility
    max_distance_km: 15
    capacity_kg: [5, 30]
    preferred_modes: ['cargo_bike', 'van_electric']
  
  plan_context:
    - "Must protect packages from weather"
    - "Signature collection required"
    - "Redelivery costs are high"
    - "Zero-emission zones in city center"
  
  csv_columns:
    required: ["depot_lat", "depot_lon", "stop_1_lat", "stop_1_lon"]
    optional: ["stop_N_lat", "stop_N_lon", "package_weight", "delivery_time_window"]

# ============================================================================
# LIGHT COMMERCIAL (Vans)
# ============================================================================

gig_economy_delivery:
  context: "When performing rapid urban deliveries for food/parcel services"
  goal: "I want to maximize deliveries per hour while managing costs"
  outcome: "So I can earn a living wage through volume"
  
  job_type: "gig_delivery"
  
  delivery_params:
    num_stops: [8, 25]
    stop_duration_min: [2, 5]
    route_optimization: "maximize_deliveries_per_hour"
    dynamic_routing: true
  
  time_window:
    start: "11:00"
    end: "23:00"
    flexibility: "high"
    peak_hours: ["12:00-14:00", "18:00-21:00"]
  
  destination_type: "multiple_urban"
  typical_distance_km: [15, 40]
  
  parameters:
    vehicle_required: true
    cargo_capacity: true
    vehicle_type: commercial
    recurring: true
    urgency: medium
    real_time_routing: true
  
  vehicle_constraints:
    type: light_freight
    capacity_kg: [500, 3500]
    max_range_km: 200
    charging_stops_allowed: true
    preferred_modes: ['van_electric', 'van_diesel']
  
  plan_context:
    - "New orders arrive during shift"
    - "Customer ratings depend on speed"
    - "Parking/stopping frequently"
    - "Weather affects safety"
    - "Peak hours have higher earnings"
    - "Vehicle costs eat into earnings"
    - "Charging time must be minimized"
  
  csv_columns:
    required: ["start_lat", "start_lon"]
    optional: ["vehicle_type", "shift_duration", "target_earnings", "operating_area"]

service_engineer_call:
  context: "When responding to service calls with tools and replacement parts"
  goal: "I want reliable transport to reach customers quickly with all equipment"
  outcome: "So I can fix problems on first visit and maintain SLA commitments"
  
  job_type: "service"
  
  time_window:
    start: "08:00"
    end: "18:00"
    flexibility: "low"
    response_time_target: 120  # 2 hours
  
  destination_type: "single_urgent"
  typical_distance_km: [10, 50]
  
  parameters:
    vehicle_required: true
    cargo_capacity: true
    vehicle_type: commercial
    recurring: false
    urgency: high
  
  vehicle_constraints:
    type: light_freight
    capacity_kg: [300, 1000]
    tool_storage: true
    preferred_modes: ['van_electric', 'van_diesel']
  
  plan_context:
    - "Response time affects customer satisfaction"
    - "Must carry specialized tools and parts"
    - "Cannot risk running out of charge mid-job"
    - "Traffic delays impact SLA compliance"
    - "May require multiple trips for complex jobs"
  
  csv_columns:
    required: ["origin_lat", "origin_lon", "dest_lat", "dest_lon"]
    optional: ["urgency_level", "customer_priority", "parts_required"]

trades_contractor:
  context: "When traveling to job sites with tools, materials, and equipment"
  goal: "I want dependable transport that accommodates my work requirements"
  outcome: "So I arrive on time with everything needed to complete the job"
  
  job_type: "service"
  
  time_window:
    start: "07:00"
    end: "17:00"
    flexibility: "medium"
  
  destination_type: "single_or_multiple"
  typical_distance_km: [5, 30]
  
  parameters:
    vehicle_required: true
    cargo_capacity: true
    vehicle_type: commercial
    recurring: true
    urgency: medium
  
  vehicle_constraints:
    type: light_freight
    capacity_kg: [200, 800]
    secure_storage: true
    preferred_modes: ['van_diesel', 'van_electric']
  
  plan_context:
    - "Tools and materials are expensive and need security"
    - "Some jobs require multiple trips for materials"
    - "Parking at job sites can be challenging"
    - "Early morning starts are common"
    - "Fuel/charging costs are business expense"
  
  csv_columns:
    required: ["home_lat", "home_lon", "job_site_lat", "job_site_lon"]
    optional: ["job_type", "materials_required", "estimated_duration"]

# ============================================================================
# MEDIUM FREIGHT (Trucks 7.5-18t)
# ============================================================================

regional_distribution:
  context: "When delivering goods from regional distribution center to retail stores"
  goal: "I want efficient multi-stop routes that minimize time and fuel"
  outcome: "So I complete routes on schedule and reduce operational costs"
  
  job_type: "freight"
  
  delivery_params:
    num_stops: [5, 12]
    stop_duration_min: [15, 45]
    route_optimization: "time_then_cost"
    loading_dock_required: true
  
  time_window:
    start: "06:00"
    end: "20:00"
    flexibility: "medium"
  
  destination_type: "multiple_commercial"
  typical_distance_km: [50, 300]
  
  parameters:
    vehicle_required: true
    cargo_capacity: true
    vehicle_type: medium_freight
    recurring: true
    urgency: medium
  
  vehicle_constraints:
    type: medium_freight
    capacity_kg: [5000, 15000]
    max_range_km: 300
    loading_equipment: true
    preferred_modes: ['truck_electric', 'truck_diesel']
  
  plan_context:
    - "Delivery windows must be respected"
    - "Loading docks have limited availability"
    - "Range anxiety for electric trucks on long routes"
    - "Weight restrictions on some roads"
    - "Depot charging available overnight"
  
  csv_columns:
    required: ["depot_lat", "depot_lon", "store_1_lat", "store_1_lon"]
    optional: ["store_N_lat", "store_N_lon", "delivery_window", "cargo_weight"]

furniture_delivery:
  context: "When delivering large furniture items to residential customers"
  goal: "I want to deliver items safely without damage"
  outcome: "So customers are satisfied and we avoid costly returns"
  
  job_type: "delivery"
  
  delivery_params:
    num_stops: [1, 3]
    stop_duration_min: [20, 60]
    assembly_required: true
  
  time_window:
    start: "09:00"
    end: "18:00"
    flexibility: "low"
    customer_must_be_present: true
  
  destination_type: "residential"
  typical_distance_km: [20, 100]
  
  parameters:
    vehicle_required: true
    cargo_capacity: true
    vehicle_type: medium_freight
    recurring: false
    urgency: low
  
  vehicle_constraints:
    type: medium_freight
    capacity_kg: [3000, 8000]
    tail_lift: true
    preferred_modes: ['truck_diesel', 'truck_electric']
  
  plan_context:
    - "Bulky items require careful handling"
    - "Access to properties varies"
    - "Two-person crew usually required"
    - "Customer scheduling is inflexible"
    - "Damage claims are expensive"
  
  csv_columns:
    required: ["warehouse_lat", "warehouse_lon", "customer_lat", "customer_lon"]
    optional: ["delivery_window", "assembly_required", "access_restrictions"]

construction_materials:
  context: "When transporting construction materials to active building sites"
  goal: "I want reliable delivery that doesn't delay construction schedules"
  outcome: "So projects stay on timeline and we maintain contractor relationships"
  
  job_type: "freight"
  
  delivery_params:
    num_stops: [1, 3]
    stop_duration_min: [30, 90]
    crane_or_forklift_available: "sometimes"
  
  time_window:
    start: "06:00"
    end: "16:00"
    flexibility: "very_low"
  
  destination_type: "construction_site"
  typical_distance_km: [10, 80]
  
  parameters:
    vehicle_required: true
    cargo_capacity: true
    vehicle_type: medium_freight
    recurring: true
    urgency: medium
  
  vehicle_constraints:
    type: medium_freight
    capacity_kg: [8000, 18000]
    off_road_capable: true
    preferred_modes: ['truck_diesel']
  
  plan_context:
    - "Construction sites have limited access"
    - "Delays cascade through project timeline"
    - "Weather affects site accessibility"
    - "Heavy loads require specialized equipment"
    - "Range not critical for local deliveries"
  
  csv_columns:
    required: ["supplier_lat", "supplier_lon", "site_lat", "site_lon"]
    optional: ["material_type", "weight_tonnes", "site_access_type"]

# ============================================================================
# HEAVY FREIGHT (HGVs 44t)
# ============================================================================

long_haul_freight:
  context: "When transporting full loads over long distances between cities"
  goal: "I want to complete routes efficiently while managing driver hours and costs"
  outcome: "So we maximize fleet utilization and maintain delivery schedules"
  
  job_type: "freight"
  
  delivery_params:
    num_stops: [1, 3]
    stop_duration_min: [45, 180]
    driver_hours_regulated: true
    rest_breaks_required: true
  
  time_window:
    start: "00:00"
    end: "23:59"
    flexibility: "medium"
  
  destination_type: "warehouse_or_port"
  typical_distance_km: [400, 800]
  
  parameters:
    vehicle_required: true
    cargo_capacity: true
    cargo_weight_kg: 15000  # 15 tonnes
    vehicle_type: heavy_freight
    recurring: true
    urgency: medium
  
  vehicle_constraints:
    type: heavy_freight
    capacity_kg: [20000, 44000]
    max_range_km: 800
    tachograph_compliant: true
    preferred_modes: ['hgv_diesel', 'hgv_hydrogen']
  
  plan_context:
    - "Driver hours limited by regulations"
    - "Fuel/hydrogen refueling infrastructure sparse"
    - "Route planning must consider weight restrictions"
    - "Weather delays on long routes are common"
    - "Overnight parking security important"
    - "Electric range insufficient for long haul (currently)"
  
  csv_columns:
    required: ["origin_depot_lat", "origin_depot_lon", "dest_depot_lat", "dest_depot_lon"]
    optional: ["cargo_type", "weight_tonnes", "delivery_deadline", "driver_id"]

port_to_warehouse:
  context: "When moving container freight from port to distribution centers"
  goal: "I want rapid turnaround to minimize port demurrage charges"
  outcome: "So we reduce costs and maintain supply chain efficiency"
  
  job_type: "freight"
  
  delivery_params:
    num_stops: [1, 2]
    stop_duration_min: [60, 120]
    container_handling: true
  
  time_window:
    start: "00:00"
    end: "23:59"
    flexibility: "low"
    demurrage_deadline: true
  
  destination_type: "port_to_warehouse"
  typical_distance_km: [50, 400]
  
  parameters:
    vehicle_required: true
    cargo_capacity: true
    vehicle_type: heavy_freight
    recurring: true
    urgency: high
  
  vehicle_constraints:
    type: heavy_freight
    capacity_kg: [25000, 44000]
    max_range_km: 400
    container_chassis: true
    preferred_modes: ['hgv_electric', 'hgv_diesel', 'hgv_hydrogen']
  
  plan_context:
    - "Port demurrage charges escalate quickly"
    - "Container slot booking affects timing"
    - "Traffic around ports is unpredictable"
    - "Electric trucks viable for port-warehouse routes"
    - "Depot charging infrastructure available"
  
  csv_columns:
    required: ["port_lat", "port_lon", "warehouse_lat", "warehouse_lon"]
    optional: ["container_id", "weight_tonnes", "demurrage_deadline", "customs_cleared"]

supermarket_supply:
  context: "When delivering goods from distribution center to supermarket stores"
  goal: "I want reliable delivery during store operating hours"
  outcome: "So shelves are stocked and we meet retail partner commitments"
  
  job_type: "freight"
  
  delivery_params:
    num_stops: [1, 4]
    stop_duration_min: [30, 120]
    temperature_controlled: "sometimes"
  
  time_window:
    start: "06:00"
    end: "22:00"
    flexibility: "low"
    night_delivery_restricted: true
  
  destination_type: "retail"
  typical_distance_km: [50, 300]
  
  parameters:
    vehicle_required: true
    cargo_capacity: true
    vehicle_type: heavy_freight
    recurring: true
    urgency: high
  
  vehicle_constraints:
    type: heavy_freight
    capacity_kg: [15000, 30000]
    max_range_km: 300
    temperature_control: "optional"
    preferred_modes: ['hgv_electric', 'hgv_diesel']
  
  plan_context:
    - "Delivery windows are strictly enforced"
    - "Store loading bays have limited capacity"
    - "Fresh food deliveries cannot be delayed"
    - "Urban access restrictions apply"
    - "Zero-emission zones favor electric trucks"
  
  time_window:
    start: 6
    end: 22
    flexibility: low
  
  csv_columns:
    required: ["dc_lat", "dc_lon", "store_lat", "store_lon"]
    optional: ["delivery_window", "refrigerated", "store_capacity"]

manufacturing_supply_chain:
  context: "When delivering components for just-in-time manufacturing"
  goal: "I want guaranteed on-time delivery to prevent production line stops"
  outcome: "So manufacturing schedules are maintained and we avoid costly delays"
  
  job_type: "freight"
  
  delivery_params:
    num_stops: [1, 2]
    stop_duration_min: [30, 90]
    just_in_time: true
  
  time_window:
    start: "00:00"
    end: "23:59"
    flexibility: "very_low"
    production_line_dependent: true
  
  destination_type: "manufacturing_plant"
  typical_distance_km: [100, 500]
  
  parameters:
    vehicle_required: true
    cargo_capacity: true
    vehicle_type: heavy_freight
    recurring: true
    urgency: critical
  
  vehicle_constraints:
    type: heavy_freight
    capacity_kg: [10000, 25000]
    tracked_gps: true
    backup_vehicle_available: true
    preferred_modes: ['hgv_diesel', 'hgv_electric']
  
  desire_overrides:
    time: 0.95
    reliability: 0.9
    cost: 0.1
  
  plan_context:
    - "Production line stops cost thousands per hour"
    - "Timing is more critical than cost"
    - "Real-time tracking required"
    - "Backup plans essential"
    - "Weather-related delays must be anticipated"
  
  csv_columns:
    required: ["supplier_lat", "supplier_lon", "plant_lat", "plant_lon"]
    optional: ["production_slot", "component_type", "delivery_tolerance_min"]

# ============================================================================
# SPECIALIZED FREIGHT
# ============================================================================

refrigerated_transport:
  context: "When transporting temperature-sensitive goods"
  goal: "I want to maintain cold chain integrity throughout transport"
  outcome: "So products arrive in saleable condition and we avoid costly spoilage"
  
  job_type: "freight"
  
  delivery_params:
    num_stops: [3, 10]
    stop_duration_min: [10, 30]
    temperature_monitoring: "continuous"
  
  time_window:
    start: "04:00"
    end: "18:00"
    flexibility: "low"
  
  destination_type: "multiple_retail_food"
  typical_distance_km: [50, 300]
  
  parameters:
    vehicle_required: true
    cargo_capacity: true
    vehicle_type: medium_freight
    recurring: true
    urgency: high
    special_requirements: ['refrigeration']
  
  vehicle_constraints:
    type: medium_freight
    capacity_kg: [5000, 15000]
    temperature_controlled: true
    temperature_range: [-20, 5]  # Celsius
    preferred_modes: ['truck_diesel', 'truck_electric']
  
  plan_context:
    - "Temperature breaches cause product loss"
    - "Door opening time must be minimized"
    - "Refrigeration unit consumes significant power"
    - "Electric trucks challenged by refrigeration load"
    - "Route must minimize delivery time"
  
  csv_columns:
    required: ["cold_storage_lat", "cold_storage_lon", "dest_lat", "dest_lon"]
    optional: ["temperature_range", "product_type", "max_door_open_time"]

waste_collection:
  context: "When collecting commercial waste on scheduled routes"
  goal: "I want efficient routes that serve all customers reliably"
  outcome: "So waste is removed on schedule and we maintain service contracts"
  
  job_type: "service"
  
  delivery_params:
    num_stops: [15, 40]
    stop_duration_min: [5, 15]
    route_optimization: "minimize_distance"
  
  time_window:
    start: "05:00"
    end: "14:00"
    flexibility: "medium"
  
  destination_type: "multiple_commercial"
  typical_distance_km: [40, 100]
  
  parameters:
    vehicle_required: true
    cargo_capacity: true
    vehicle_type: medium_freight
    recurring: true
    urgency: low
  
  vehicle_constraints:
    type: medium_freight
    capacity_kg: [8000, 15000]
    compactor_body: true
    preferred_modes: ['truck_diesel', 'truck_electric']
  
  plan_context:
    - "Fixed routes with regular customers"
    - "Early morning starts to avoid traffic"
    - "Weight increases throughout route"
    - "Noise restrictions in residential areas"
    - "Electric trucks reduce emissions and noise"
  
  csv_columns:
    required: ["depot_lat", "depot_lon", "route_id"]
    optional: ["customer_list", "estimated_tonnage"]

