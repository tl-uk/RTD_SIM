# RTD_SIM Job Contexts - Phase 4.5F: Expanded Freight
# Key fix: Add vehicle_required flag to freight_delivery_route

# ============================================================================
# MICRO-DELIVERY (Last-Mile Urban)
# ============================================================================

urban_food_delivery:
  job_type: delivery
  description: Quick-commerce food delivery in dense urban area
  parameters:
    vehicle_required: true
    cargo_capacity: false  # Small packages only
    vehicle_type: micro_mobility
    recurring: true
    urgency: high
    time_sensitive: true
  vehicle_constraints:
    type: micro_mobility
    max_distance_km: 10
    preferred_modes: ['cargo_bike', 'bike']
  desire_overrides:
    time: 0.9  # Speed is critical
    cost: 0.2

urban_parcel_delivery:
  job_type: delivery
  description: Last-mile parcel delivery in city center
  parameters:
    vehicle_required: true
    cargo_capacity: false
    vehicle_type: micro_mobility
    recurring: true
    urgency: medium
  vehicle_constraints:
    type: micro_mobility
    max_distance_km: 15
    preferred_modes: ['cargo_bike', 'van_electric']

