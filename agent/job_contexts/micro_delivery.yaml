urban_food_delivery:
  context: When delivering food orders in dense urban areas during peak hours
  goal: I want to complete maximum deliveries per hour efficiently
  outcome: So I can maximize earnings and maintain customer ratings
  job_type: gig_delivery
  delivery_params:
    num_stops:
    - 5
    - 15
    stop_duration_min:
    - 2
    - 5
    route_optimization: maximize_deliveries_per_hour
    dynamic_routing: true
  time_window:
    start: '11:00'
    end: '23:00'
    flexibility: medium
    peak_hours:
    - 12:00-14:00
    - 18:00-21:00
  destination_type: multiple_urban
  typical_distance_km:
  - 5
  - 10
  parameters:
    vehicle_required: true
    cargo_capacity: false
    vehicle_type: micro_mobility
    recurring: true
    urgency: high
    time_sensitive: true
  vehicle_constraints:
    type: micro_mobility
    max_distance_km: 10
    preferred_modes:
    - cargo_bike
    - bike
  desire_overrides:
    time: 0.9
    cost: 0.2
  plan_context:
  - Speed is critical for customer satisfaction
  - Multiple short stops require quick parking
  - Weather affects cargo bike safety
  - Peak hours have surge pricing
  - Battery/range management crucial
  csv_columns:
    required:
    - origin_lat
    - origin_lon
    - dest_lat
    - dest_lon
    optional:
    - delivery_window
    - customer_rating_impact
    - surge_multiplier
urban_parcel_delivery:
  context: When delivering parcels in city center with tight delivery windows
  goal: I want reliable transport that handles packages safely
  outcome: So I meet delivery commitments and avoid failed deliveries
  job_type: delivery
  delivery_params:
    num_stops:
    - 8
    - 20
    stop_duration_min:
    - 3
    - 8
    route_optimization: time_then_cost
    dynamic_routing: false
  time_window:
    start: 08:00
    end: '18:00'
    flexibility: low
  destination_type: multiple_urban
  typical_distance_km:
  - 10
  - 15
  parameters:
    vehicle_required: true
    cargo_capacity: false
    vehicle_type: micro_mobility
    recurring: true
    urgency: medium
  vehicle_constraints:
    type: micro_mobility
    max_distance_km: 15
    capacity_kg:
    - 5
    - 30
    preferred_modes:
    - cargo_bike
    - van_electric
  plan_context:
  - Must protect packages from weather
  - Signature collection required
  - Redelivery costs are high
  - Zero-emission zones in city center
  csv_columns:
    required:
    - depot_lat
    - depot_lon
    - stop_1_lat
    - stop_1_lon
    optional:
    - stop_N_lat
    - stop_N_lon
    - package_weight
    - delivery_time_window
gig_economy_delivery:
  context: When performing rapid urban deliveries for food/parcel services
  goal: I want to maximize deliveries per hour while managing costs
  outcome: So I can earn a living wage through volume
  job_type: gig_delivery
  delivery_params:
    num_stops:
    - 8
    - 25
    stop_duration_min:
    - 2
    - 5
    route_optimization: maximize_deliveries_per_hour
    dynamic_routing: true
  time_window:
    start: '11:00'
    end: '23:00'
    flexibility: high
    peak_hours:
    - 12:00-14:00
    - 18:00-21:00
  destination_type: multiple_urban
  typical_distance_km:
  - 15
  - 40
  parameters:
    vehicle_required: true
    cargo_capacity: true
    vehicle_type: micro_mobility
    recurring: true
    urgency: medium
    real_time_routing: true
  vehicle_constraints:
    type: micro_mobility
    capacity_kg:
    - 5
    - 30
    max_range_km: 50
    preferred_modes:
    - cargo_bike
    - van_electric
  desire_overrides:
    time: 0.85
    cost: 0.7
  plan_context:
  - New orders arrive during shift
  - Customer ratings depend on speed
  - Parking/stopping frequently
  - Weather affects safety
  - Peak hours have higher earnings
  - Vehicle costs eat into earnings
  - Charging time must be minimized
  csv_columns:
    required:
    - start_lat
    - start_lon
    optional:
    - vehicle_type
    - shift_duration
    - target_earnings
    - operating_area
