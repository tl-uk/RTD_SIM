# agent/job_contexts/passenger.yaml
# Passenger job contexts for various personal travel scenarios

morning_commute:
  context: When commuting to work during rush hour
  goal: I want to arrive on time without stress
  outcome: So I can be productive and start work refreshed
  job_type: commute
  time_window:
    start: 07:00
    end: 09:00
    flexibility: low
    preferred_arrival: 08:45
  destination_type: workplace
  typical_distance_km:
  - 5
  - 15
  parameters:
    vehicle_required: false
    recurring: true
    frequency: 5/week
    urgency: medium
    interruptible: false
  plan_context:
  - Rush hour traffic expected
  - Parking at destination may be limited
  - Public transport crowded during peak
  - Arriving late affects professional reputation
  csv_columns:
    required:
    - origin_lat
    - origin_lon
    - dest_lat
    - dest_lon
    optional:
    - preferred_arrival
    - mode_preference
    - max_cost
    - workplace_parking
commute_flexible:
  context: When commuting to work with flexible timing
  goal: I want a pleasant journey that fits my schedule
  outcome: So I arrive ready to work without time pressure
  job_type: commute
  time_window:
    start: 7
    end: 10
    flexibility: high
  destination_type: workplace
  typical_distance_km:
  - 3
  - 12
  parameters:
    vehicle_required: false
    recurring: true
    urgency: medium
  csv_columns:
    required:
    - home_lat
    - home_lon
    - work_lat
    - work_lon
    optional:
    - preferred_mode
    - flex_hours
shopping_trip:
  context: When making regular shopping trips for groceries and essentials
  goal: I want convenient transport that handles shopping bags
  outcome: So I can purchase what I need and get it home easily
  job_type: shopping
  time_window:
    start: 09:00
    end: '17:00'
    flexibility: high
  destination_type: retail
  typical_distance_km:
  - 1
  - 8
  parameters:
    vehicle_required: false
    luggage_present: true
    recurring: true
    urgency: low
    return_journey: true
  plan_context:
  - Must accommodate shopping bags/trolley
  - Active transport limited by carrying capacity
  - Return journey with load affects mode choice
  - May combine with other errands
  - Parking availability at destination
  csv_columns:
    required:
    - origin_lat
    - origin_lon
    - dest_lat
    - dest_lon
    optional:
    - shopping_volume
    - has_car
    - preferred_store
