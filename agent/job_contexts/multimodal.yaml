# agent/job_contexts/multimodal.yaml
#
# Multimodal job contexts — UNIQUE entries only.
#
# REORGANISATION NOTE (v2):
#   The following jobs were MOVED to transit_passenger.yaml (authoritative):
#     intercity_train_commute, island_ferry_trip, accessible_tram_journey,
#     tourist_scenic_rail, multi_modal_commute
#
#   This file retains only jobs that are NOT defined in transit_passenger.yaml:
#     business_flight  — high-urgency air travel (business_commuter/business_traveler only)
#     last_mile_scooter — station-to-destination micro-mobility leg

business_flight:
  context: When flying for an urgent business meeting requiring same-day return
  goal: I want the fastest possible travel to maximise face-time at the meeting
  outcome: So I attend the meeting and return the same day without overnight stays
  job_type: business_travel
  time_window:
    start: 06:00
    end: '10:00'
    flexibility: very_low
    return_trip: true
    return_by: '20:00'
  destination_type: city_center
  typical_distance_km:
    - 300
    - 900
  parameters:
    vehicle_required: false
    vehicle_type: personal
    priority: normal
    recurring: false
    urgency: high
    luggage_minimal: true
  vehicle_constraints:
    preferred_modes:
      - flight_domestic
      - intercity_train
      - car
      - ev
  desire_overrides:
    time: 0.95
    cost: 0.2
  plan_context:
    - Airport security adds 90+ minutes — factor into door-to-door comparison
    - Intercity train competitive for journeys under 400km
    - Same-day return is a hard requirement
    - Freight and van modes entirely inappropriate for this context
  csv_columns:
    required:
      - origin_lat
      - origin_lon
      - dest_lat
      - dest_lon
    optional:
      - meeting_time
      - flexibility


last_mile_scooter:
  context: When covering the final 1-5km from a train station to the destination
  goal: I want a quick, convenient connection that avoids waiting for a bus
  outcome: So I complete my journey door-to-door without needing a car
  job_type: last_mile
  time_window:
    start: 07:00
    end: '20:00'
    flexibility: medium
  destination_type: urban_office
  typical_distance_km:
    - 1
    - 5
  parameters:
    vehicle_required: false
    vehicle_type: personal
    priority: normal
    recurring: true
    urgency: medium
    weather_dependent: true
  vehicle_constraints:
    preferred_modes:
      - e_scooter
      - bike
      - walk
      - bus
      - tram
  plan_context:
    - Trip is a short last-mile leg — rarely more than 3km
    - E-scooter hire available at many Edinburgh/Glasgow stations
    - Weather strongly affects willingness to use active modes
    - Freight modes are entirely inappropriate for last-mile passenger travel
  csv_columns:
    required:
      - station_lat
      - station_lon
      - dest_lat
      - dest_lon
    optional:
      - scooter_available
