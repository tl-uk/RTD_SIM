# agent/job_contexts/transit_passenger.yaml
#
# Canonical passenger and transit job contexts.
# This file is the SINGLE AUTHORITATIVE SOURCE for all passenger commute,
# shopping, and public-transit job definitions.
#
# WHY THIS FILE IS AUTHORITATIVE:
#   Previous versions of morning_commute/commute_flexible/shopping_trip in
#   passenger.yaml lacked vehicle_type, priority, and preferred_modes fields.
#   The parser produced priority=commercial for morning_commute as a result
#   of the missing fields combined with duplicate-key non-determinism.
#   Those files now redirect to this one.
#
# MODE NAMES — must exactly match BDI planner recognised modes:
#   Personal:  walk, bike, e_scooter, bus, tram, car, ev
#   Rail:      local_train, intercity_train
#   Ferry:     ferry_diesel, ferry_electric
#   Freight:   van_electric, van_diesel, cargo_bike, truck_electric,
#              truck_diesel, hgv_electric, hgv_diesel, hgv_hydrogen
#   Aviation:  flight_domestic, flight_electric
#
#   NEVER USE: train, ferry, ebike, taxi, accessible_taxi, accessible_bus,
#              car_petrol, car_ev, car_diesel, tram (use bus as fallback)
#              (tram IS a recognised planner mode but coverage is limited)


# ── COMMUTE ──────────────────────────────────────────────────────────────────

morning_commute:
  context: When travelling to work during the morning peak period
  goal: I want to arrive at work on time and as stress-free as possible
  outcome: So I start the working day in a good state and meet my obligations
  job_type: passenger_commute
  time_window:
    start: 6
    end: 10
    flexibility: low
    preferred_arrival: '08:45'
  destination_type: workplace
  typical_distance_km:
    - 2
    - 40
  parameters:
    vehicle_required: false
    vehicle_type: personal
    priority: normal            # explicit — prevents default commercial mapping
    recurring: true
    urgency: high
    interruptible: false
  vehicle_constraints:
    preferred_modes:
      - bus
      - tram
      - local_train
      - walk
      - bike
      - car
      - ev
    # Freight modes are excluded — commuters do not use HGVs or vans.
    # vehicle_type=personal ensures Step 3.6 removes freight modes anyway.
  plan_context:
    - Time reliability is the primary concern during morning peak
    - Mode habits are strong and resistant to change (Markov lock-in)
    - Weather significantly affects active travel choice
    - Parking costs and availability influence car vs transit split
    - Rush-hour traffic reduces car speed advantage over bus/train
  csv_columns:
    required:
      - origin_lat
      - origin_lon
      - dest_lat
      - dest_lon
    optional:
      - preferred_arrival
      - workplace_parking
      - max_cost

# ----------------------------------------------------------------------------
commute_flexible:
  context: When commuting with flexible timing — flexi-hours, part-time, or variable start
  goal: I want to travel outside peak hours where possible to reduce stress and cost
  outcome: So I have a more comfortable journey and may access cheaper off-peak fares
  job_type: passenger_commute
  time_window:
    start: 7
    end: 11
    flexibility: high
  destination_type: workplace
  typical_distance_km:
    - 2
    - 30
  parameters:
    vehicle_required: false
    vehicle_type: personal
    priority: normal
    recurring: true
    urgency: medium
  vehicle_constraints:
    preferred_modes:
      - local_train
      - bus
      - tram
      - walk
      - bike
      - car
      - ev
  plan_context:
    - Flexibility allows off-peak rail/bus fares — cost sensitivity higher
    - Active travel more attractive with relaxed timing
    - Frequency of services matters less than for peak commuters
    - EV/car as fallback when transit doesn't align with flexible schedule
  csv_columns:
    required:
      - home_lat
      - home_lon
      - work_lat
      - work_lon
    optional:
      - preferred_mode
      - flex_hours

# ----------------------------------------------------------------------------
multi_modal_commute:
  context: When commuting using a combination of transport modes (bike+train, bus+walk)
  goal: I want to chain modes efficiently to cover each leg of my journey optimally
  outcome: So I can access destinations not well-served by any single mode
  job_type: passenger_commute
  time_window:
    start: 6
    end: 10
    flexibility: low
  destination_type: workplace_or_hub
  typical_distance_km:
    - 5
    - 60
  parameters:
    vehicle_required: false
    vehicle_type: transit
    priority: normal
    recurring: true
    urgency: high
  vehicle_constraints:
    preferred_modes:
      - local_train
      - intercity_train
      - bus
      - tram
      - bike
      - walk
      - ev
      - car
    # Multi-modal commuters use a wide set of modes but exclude freight vehicles.
  plan_context:
    - First/last mile active travel is a core part of the journey
    - Bike parking and tram stop proximity are critical enablers
    - Disruption to one leg cascades to others — reliability critical
    - EV/car used as fallback when transit disruption occurs
  csv_columns:
    required:
      - home_lat
      - home_lon
      - work_lat
      - work_lon
    optional:
      - station_lat
      - station_lon

# ----------------------------------------------------------------------------
intercity_train_commute:
  context: When commuting daily between cities over long distances (e.g. Edinburgh–Glasgow)
  goal: I want a fast, productive intercity journey with reliable scheduling
  outcome: So I arrive on time, work during travel, and avoid city parking costs
  job_type: passenger_transit
  time_window:
    start: 6
    end: 22
    flexibility: low
  destination_type: city_centre_office
  typical_distance_km:
    - 50
    - 150
  parameters:
    vehicle_required: false
    vehicle_type: transit
    priority: normal
    recurring: true
    urgency: high
  vehicle_constraints:
    preferred_modes:
      - intercity_train
      - local_train
      - bus
      - car
      - ev
    # Train is the primary intent; car/ev as fallback for planner.
    # Freight vehicle modes are entirely inappropriate here.
  plan_context:
    - Long-distance commuter needs rail as primary mode
    - Car/EV are valid fallbacks when rail is disrupted
    - Productive use of travel time important (train favoured over car)
    - Season ticket economics create strong Markov mode lock-in
  csv_columns:
    required:
      - origin_lat
      - origin_lon
      - dest_lat
      - dest_lon
    optional:
      - train_preference
      - season_ticket


# ── SHOPPING AND ERRANDS ─────────────────────────────────────────────────────

shopping_trip:
  context: When making a routine or occasional trip to shops or services
  goal: I want a practical, convenient journey that lets me carry purchases home
  outcome: So I complete errands without excessive cost or effort
  job_type: passenger_errand
  time_window:
    start: 9
    end: 20
    flexibility: high
  destination_type: retail_or_town_centre
  typical_distance_km:
    - 1
    - 20
  parameters:
    vehicle_required: false
    vehicle_type: personal
    priority: normal
    recurring: false
    urgency: low
    luggage_present: true
    return_journey: true
  vehicle_constraints:
    preferred_modes:
      - walk
      - bus
      - tram
      - bike
      - car
      - ev
    # Freight modes excluded — consumers do not use HGVs for shopping.
  plan_context:
    - Mode choice depends heavily on distance and amount to carry
    - Short trips well-suited to walk or bike
    - Longer trips or heavy loads favour car, EV
    - Bus/tram viable where routes serve retail destinations
    - Return journey with load affects active-mode willingness
  csv_columns:
    required:
      - origin_lat
      - origin_lon
      - dest_lat
      - dest_lon
    optional:
      - shopping_volume
      - preferred_store


# ── TRANSIT-SPECIFIC PASSENGER JOURNEYS ──────────────────────────────────────

accessible_tram_journey:
  context: When travelling within the city using step-free accessible public transport
  goal: I want a fully accessible tram or bus journey with level boarding
  outcome: So I can travel independently without relying on assistance or taxis
  job_type: passenger_transit
  time_window:
    start: 7
    end: 21
    flexibility: medium
  destination_type: city_centre_or_suburb
  typical_distance_km:
    - 1
    - 15
  parameters:
    vehicle_required: false
    vehicle_type: transit
    priority: normal
    recurring: false
    urgency: medium
    accessibility_required: true
    wheelchair_accessible: true
  vehicle_constraints:
    preferred_modes:
      - tram
      - bus
      - walk
      - car
      - ev
    # tram and bus are the primary modes.
    # car/ev as accessible fallback when tram/bus unavailable.
    # Freight modes entirely excluded — no accessible journey uses freight vehicles.
  accessibility_requirements:
    level_boarding: true
    wheelchair_space: true
    audio_announcements: true
  plan_context:
    - Tram is the primary mode where Edinburgh tram network is available
    - Bus provides coverage outside tram corridor
    - Journey must be step-free throughout
    - Avoids stairs, steep ramps, unpaved paths
    - Pre-booking may be required for community transport fallback
  csv_columns:
    required:
      - origin_lat
      - origin_lon
      - dest_lat
      - dest_lon
    optional:
      - accessibility_features

# ----------------------------------------------------------------------------
tourist_scenic_rail:
  context: When exploring scenic rail routes as part of a leisure or holiday trip
  goal: I want a slow, scenic journey that maximises the travel experience
  outcome: So I can experience the landscape and arrive relaxed without hiring a car
  job_type: passenger_leisure
  time_window:
    start: 8
    end: 20
    flexibility: high
  destination_type: scenic_destination_or_rural
  typical_distance_km:
    - 30
    - 200
  parameters:
    vehicle_required: false
    vehicle_type: transit
    priority: normal
    recurring: false
    urgency: low
  vehicle_constraints:
    preferred_modes:
      - local_train
      - intercity_train
      - bus
      - ferry_diesel
      - walk
      - bike
    # Rail is the primary mode.
    # Bus and ferry included for legs where rail is unavailable (islands, rural).
    # Walk and bike for last-mile or short excursions at destination.
    # Car, EV, and freight modes excluded — this job represents car-free tourism.
  plan_context:
    - West Highland Line and similar scenic routes are the intended experience
    - Time flexibility is high — slower routes preferred over faster ones
    - Luggage may limit cycling but does not affect rail/bus
    - Rail passes may be used for multi-leg journeys
    - Island ferry legs are natural extensions of scenic rail trips
  csv_columns:
    required:
      - origin_lat
      - origin_lon
      - dest_lat
      - dest_lon
    optional:
      - scenic_route_name
      - attractions

# ----------------------------------------------------------------------------
island_ferry_trip:
  context: When travelling to or from a Scottish island via scheduled ferry service
  goal: I want a reliable ferry crossing that fits my schedule and budget
  outcome: So I can access mainland services or return home without stress
  job_type: passenger_transit
  time_window:
    start: 6
    end: 20
    flexibility: very_low
  destination_type: island_or_port
  typical_distance_km:
    - 5
    - 80
  parameters:
    vehicle_required: false
    vehicle_type: transit
    priority: normal
    ferry_dependent: true
    recurring: false
    urgency: high
    island_destination: true
    coastal_route: true
  vehicle_constraints:
    preferred_modes:
      - ferry_diesel
      - ferry_electric
      - bus
      - walk
      - car
      - ev
    # ferry_diesel is the defining mode — non-negotiable.
    # ferry_electric where CalMac/NorthLink operate hybrid/electric vessels.
    # Car/EV included as the common drive-on mode for the ferry vehicle deck.
    # Bus for connections to/from ferry terminal.
    # Freight modes excluded — passenger island trips do not use freight vehicles.
  plan_context:
    - Ferry schedule is fixed — missing it has major consequences (hours of delay)
    - Drive-on ferry allows car/EV transport to island
    - Walk-on passengers use bus connections to terminal
    - Advance booking strongly preferred
    - Weather can cancel sailings — plan for contingency
    - Electric ferries (ferry_electric) now operating on some CalMac routes
  csv_columns:
    required:
      - island_lat
      - island_lon
      - mainland_lat
      - mainland_lon
    optional:
      - ferry_operator
      - sailing_time
