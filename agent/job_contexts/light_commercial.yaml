# agent/job_contexts/light_commercial.yaml
# Light commercial job contexts for service and delivery scenarios

service_engineer_call:
  context: When responding to service calls with tools and replacement parts
  goal: I want reliable transport to reach customers quickly with all equipment
  outcome: So I can fix problems on first visit and maintain SLA commitments
  job_type: service
  time_window:
    start: 08:00
    end: '18:00'
    flexibility: low
    response_time_target: 120
  destination_type: single_urgent
  typical_distance_km:
  - 10
  - 50
  parameters:
    vehicle_required: true
    cargo_capacity: true
    vehicle_type: commercial
    recurring: false
    urgency: high
  vehicle_constraints:
    type: light_freight
    capacity_kg:
    - 300
    - 1000
    tool_storage: true
    preferred_modes:
    - van_electric
    - van_diesel
  plan_context:
  - Response time affects customer satisfaction
  - Must carry specialized tools and parts
  - Cannot risk running out of charge mid-job
  - Traffic delays impact SLA compliance
  - May require multiple trips for complex jobs
  csv_columns:
    required:
    - origin_lat
    - origin_lon
    - dest_lat
    - dest_lon
    optional:
    - urgency_level
    - customer_priority
    - parts_required

# ----------------------------------------------------------------------------
trades_contractor:
  context: When traveling to job sites with tools, materials, and equipment
  goal: I want dependable transport that accommodates my work requirements
  outcome: So I arrive on time with everything needed to complete the job
  job_type: service
  time_window:
    start: 07:00
    end: '17:00'
    flexibility: medium
  destination_type: single_or_multiple
  typical_distance_km:
  - 5
  - 30
  parameters:
    vehicle_required: true
    cargo_capacity: true
    vehicle_type: commercial
    recurring: true
    urgency: medium
  vehicle_constraints:
    type: light_freight
    capacity_kg:
    - 200
    - 800
    secure_storage: true
    preferred_modes:
    - van_diesel
    - van_electric
  plan_context:
  - Tools and materials are expensive and need security
  - Some jobs require multiple trips for materials
  - Parking at job sites can be challenging
  - Early morning starts are common
  - Fuel/charging costs are business expense
  csv_columns:
    required:
    - home_lat
    - home_lon
    - job_site_lat
    - job_site_lon
    optional:
    - job_type
    - materials_required
    - estimated_duration

# ----------------------------------------------------------------------------
freight_delivery_route:
  context: When performing multi-stop delivery route with time windows
  goal: I want to complete all deliveries efficiently and on time
  outcome: So I maintain customer satisfaction and operational efficiency
  job_type: delivery
  delivery_params:
    num_stops:
    - 3
    - 8
    stop_duration_min:
    - 10
    - 20
    route_optimization: time_then_emissions
  time_window:
    start: 06:00
    end: '18:00'
    flexibility: medium
  destination_type: multiple
  typical_distance_km:
  - 30
  - 150
  parameters:
    vehicle_required: true
    cargo_capacity: true
    vehicle_type: commercial
    recurring: true
    urgency: medium
  vehicle_constraints:
    type: light_freight
    capacity_kg:
    - 500
    - 3500
    max_range_km: 200
    charging_stops_allowed: true
    preferred_modes:
    - van_electric
    - van_diesel
  plan_context:
  - Some delivery windows are strict
  - Route may require charging stop
  - Traffic congestion affects delivery times
  - Failed delivery requires rescheduling
  - Loading/unloading time varies by stop
  csv_columns:
    required:
    - depot_lat
    - depot_lon
    - stop_1_lat
    - stop_1_lon
    optional:
    - stop_N_lat
    - stop_N_lon
    - stop_N_time_window
    - vehicle_type
    - load_kg
    - delivery_priority
