# agent/story_combinations.yaml
#
# Defines how user stories and job stories interact.
# Optional: used for fine-tuning specific combinations.
#
# IMPORTANT: All job keys referenced here MUST exist in a job context YAML file.
# Dead references are silently ignored but waste parser cycles and mask bugs.
#
# Jobs that were referenced but DO NOT exist (removed 2026-03-21):
#   school_run_then_work, flexible_leisure, airport_transfer,
#   tourist_exploration, night_shift
# If these jobs are needed, create them in the appropriate YAML file first.

# Default settings for all combinations
defaults:
  conflict_resolution: "dynamic"  # dynamic | user_priority | job_priority
  apply_variance: true
  desire_blend_weights:
    from_persona: 0.7   # 70% user story desires
    from_job: 0.3       # 30% job context overrides

# Specific combination overrides (only for combinations that exist in both
# user story whitelist AND job context YAML files)
combinations:

  # Eco warrior during rush hour — willing to leave earlier to use active transport
  eco_warrior_morning_commute:
    persona: "eco_warrior"
    job: "morning_commute"
    conflict_resolution: "blend"
    overrides:
      time_window_adjust: "-15min"
      notes: "Eco warriors plan ahead to use sustainable transport"

  # Parent commute — safety overrides eco desire
  concerned_parent_morning_commute:
    persona: "concerned_parent"
    job: "morning_commute"
    conflict_resolution: "user_priority"
    overrides:
      desires:
        safety: "+0.05"
      weather_sensitivity: 1.3
      notes: "Parents prioritize child safety — weather affects active mode choice"

  # Disabled commuter — accessibility is a hard constraint
  disabled_commuter_morning_commute:
    persona: "disabled_commuter"
    job: "morning_commute"
    conflict_resolution: "user_priority"
    overrides:
      mode_constraints: ["wheelchair_accessible"]
      pre_booking_required: true
      notes: "Accessibility is a hard constraint — overrides all other preferences"

  # Accessibility user on tram network
  accessibility_user_accessible_tram_journey:
    persona: "accessibility_user"
    job: "accessible_tram_journey"
    conflict_resolution: "user_priority"
    overrides:
      mode_constraints: ["step_free", "level_boarding"]
      notes: "Full step-free access required throughout"

  # Rural resident — car is often the only practical option
  rural_resident_shopping_trip:
    persona: "rural_resident"
    job: "shopping_trip"
    conflict_resolution: "user_priority"
    overrides:
      mode_constraints: ["vehicle_likely_needed"]
      trip_chaining: true
      notes: "Rural residents must drive for most errands — combine trips"

  # Long-distance commuter — season ticket creates strong rail lock-in
  long_distance_commuter_intercity_train_commute:
    persona: "long_distance_commuter"
    job: "intercity_train_commute"
    conflict_resolution: "blend"
    overrides:
      desires:
        reliability: "+0.05"
      notes: "Season ticket economics and productivity lock in rail mode"

  # Island resident — ferry is non-negotiable first leg
  island_resident_island_ferry_trip:
    persona: "island_resident"
    job: "island_ferry_trip"
    conflict_resolution: "job_priority"
    overrides:
      desires:
        reliability: "+0.05"
      notes: "Ferry schedule dominates all other constraints"

  # Tourist on scenic rail — experience over efficiency
  tourist_visitor_tourist_scenic_rail:
    persona: "tourist_visitor"
    job: "tourist_scenic_rail"
    conflict_resolution: "user_priority"
    overrides:
      desires:
        time: "-0.2"
      scenic_weight: 2.0
      notes: "Journey is part of the destination — slower scenic routes preferred"

  tourist_tourist_scenic_rail:
    persona: "tourist"
    job: "tourist_scenic_rail"
    conflict_resolution: "user_priority"
    overrides:
      desires:
        time: "-0.15"
      scenic_weight: 1.8
      notes: "Scenic preference strong but slightly less locked-in than tourist_visitor"

  # Business traveler on a tight flight schedule
  business_traveler_business_flight:
    persona: "business_traveler"
    job: "business_flight"
    conflict_resolution: "job_priority"
    overrides:
      desires:
        reliability: "+0.1"
        time: "+0.1"
      buffer_minutes: 45
      notes: "Missing a flight is unacceptable — reliability and time dominate"

  business_commuter_business_flight:
    persona: "business_commuter"
    job: "business_flight"
    conflict_resolution: "job_priority"
    overrides:
      desires:
        reliability: "+0.1"
        time: "+0.05"
      buffer_minutes: 45
      notes: "Same-day return critical — reliability overrides cost"

  # Freight operator delivery — compliance first
  freight_operator_freight_delivery_route:
    persona: "freight_operator"
    job: "freight_delivery_route"    # defined in light_commercial.yaml
    conflict_resolution: "explicit"
    conflict_rules:
      - condition: "compliance_requirement"
        then: "compliance = 1.0, eco = 0.4"
      - condition: "delivery_window_critical"
        then: "time = 0.95, cost = 0.6"
      - condition: "normal_operation"
        then: "use persona desires"
    notes: "Regulatory compliance is non-negotiable"

  # Freight operator on port/warehouse runs — electric HGV priority
  freight_operator_port_to_warehouse:
    persona: "freight_operator"
    job: "port_to_warehouse"
    conflict_resolution: "job_priority"
    overrides:
      desires:
        time: "+0.1"
      notes: "Port demurrage charges escalate quickly — time priority elevated"

  # Delivery driver gig work — earnings optimization
  delivery_driver_gig_economy_delivery:
    persona: "delivery_driver"
    job: "gig_economy_delivery"      # defined in micro_delivery.yaml
    conflict_resolution: "job_priority"
    overrides:
      desires:
        time: "+0.1"
        cost: "+0.1"
      route_optimization: "maximize_deliveries_per_hour"
      notes: "Time is literally money in gig economy"

  # Budget student using flexible commute
  budget_student_commute_flexible:
    persona: "budget_student"
    job: "commute_flexible"
    conflict_resolution: "user_priority"
    overrides:
      mode_constraints: ["avoid_expensive"]
      notes: "Students optimize for cost — flexible timing enables off-peak cheaper fares"

  # Shift worker — reliability critical at unsociable hours
  shift_worker_morning_commute:
    persona: "shift_worker"
    job: "morning_commute"
    conflict_resolution: "blend"
    overrides:
      desires:
        safety: "+0.1"
      notes: "Night/early shift workers face safety and reliability concerns"

  # Elderly non-driver — bus pass and accessibility dominate
  elderly_non_driver_shopping_trip:
    persona: "elderly_non_driver"
    job: "shopping_trip"
    conflict_resolution: "user_priority"
    overrides:
      desires:
        accessibility: "+0.05"
        cost: "-0.1"   # concessionary bus pass reduces cost concern
      notes: "Bus pass means cost less critical; step-free access and seating priority"

  # Ride-hail driver on urban shift - heavy reliance on public DC charging
  ride_hail_driver_urban_ride_hail_shift:
    persona: "ride_hail_driver"
    job: "urban_ride_hail_shift"
    conflict_resolution: "job_priority"
    overrides:
      desires:
        time: "+0.15"  # Time charging is money lost
      route_optimization: "maximize_earnings"
      notes: "App-based driver chasing fares; highly sensitive to public charging wait times"

  # Emergency trade worker responding to a callout
  emergency_trade_worker_service_engineer_call:
    persona: "emergency_trade_worker"
    job: "service_engineer_call"
    conflict_resolution: "blend"
    overrides:
      desires:
        reliability: "+0.1"
      reliability_critical: true
      notes: "24/7 callouts mean vehicle must be 100% available; triggers hard EV block if chargers are full"
      
# Prohibited combinations — documented for story_compatibility.py whitelist
# (Prohibition is enforced in story_compatibility.py, not here)
prohibited:
  - persona: "freight_operator"
    job: "morning_commute"
    reason: "Freight operators have freight-specific job contexts (heavy_freight.yaml)"

  - persona: "freight_operator"
    job: "shopping_trip"
    reason: "Freight operators do not use freight vehicles for personal shopping"

  - persona: "delivery_driver"
    job: "tourist_scenic_rail"
    reason: "Delivery drivers work shifts — they do not tour during working hours"

  - persona: "delivery_driver"
    job: "business_flight"
    reason: "Gig delivery drivers do not fly for business"


# Test cases — all jobs verified to exist in job context YAML files
recommended_test_cases:
  - persona: "eco_warrior"
    job: "morning_commute"
    expected_mode: "bike"
    notes: "eco=0.9 + personal vehicle_type → bike or bus, not EV or car"

  - persona: "budget_student"
    job: "commute_flexible"
    expected_mode: "walk"
    notes: "cost=0.95, flexible timing → walk or bike preferred"

  - persona: "business_traveler"
    job: "business_flight"
    expected_mode: "flight_domestic"
    notes: "time=0.95, reliability=0.9 → fastest mode selected"

  - persona: "concerned_parent"
    job: "morning_commute"
    expected_mode: "ev"
    notes: "safety=0.95, school run context → EV or bus, not bike"

  - persona: "freight_operator"
    job: "freight_delivery_route"    # defined in light_commercial.yaml
    expected_mode: "van_electric"
    notes: "vehicle_type=commercial → van_electric or van_diesel"

  - persona: "island_resident"
    job: "island_ferry_trip"
    expected_mode: "ferry_diesel"
    notes: "ferry_dependent=true → ferry_diesel non-negotiable first leg"

  - persona: "accessibility_user"
    job: "accessible_tram_journey"
    expected_mode: "tram"
    notes: "accessibility_required=true, vehicle_type=transit → tram or bus only"

  - persona: "long_distance_commuter"
    job: "intercity_train_commute"
    expected_mode: "intercity_train"
    notes: "vehicle_type=transit, 50-150km → intercity_train primary"

# Metadata
version: "5.0.0"
description: "Story combination rules for RTD_SIM — corrected 2026-03-21"
