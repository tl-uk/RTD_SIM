     airport_transfer, tourist_exploration, night_shift DO exist in
     passenger_special.yaml. story_compatibility.py whitelist now includes them."
  - "Fixed two dead job references: freight_delivery_route (now light_commercial.yaml),
     gig_economy_delivery (now micro_delivery.yaml)"
  - "Fixed recommended test case for freight_operator + freight_delivery_route"
  - "story_combinations.yaml is now fully consistent with all 55 defined job contexts"
changes_v4:
