# config/ingestion.yaml
#
# RTD_SIM Story Ingestion Service — LLM Backend Configuration
#
# Three-tier fallback chain:
#   Tier 1 — OLMo 2 via Ollama   (primary; Apache 2.0, truly open source)
#   Tier 2 — Static YAML seed    (offline; no LLM required)
#   Tier 3 — Anthropic Claude    (last resort; requires ANTHROPIC_API_KEY)
#
# For funder demos: keep primary_backend: olmo and start Ollama before the demo.
# For offline use:  set yaml_fallback.enabled: true and ensure seed_library.yaml exists.
# For publication:  results must be generated with Tier 1 (OLMo 2) only.
#                   Filter published datasets by _backend: olmo in the YAML metadata.

# ── Tier 1: OLMo 2 via Ollama ─────────────────────────────────────────────────
#
# Setup:
#   brew install ollama          # macOS
#   ollama pull olmo2:13b        # ~8 GB; one-time download
#   ollama serve                 # starts API at localhost:11434
#
# For GPU servers, use vLLM instead of Ollama:
#   pip install vllm
#   vllm serve allenai/OLMo-2-1124-13B-Instruct --port 11434
#
# Citation: Groeneveld et al. (2024) https://arxiv.org/abs/2402.00838
# Licence:  Apache 2.0
# Data:     Dolma corpus https://huggingface.co/datasets/allenai/dolma
# Code:     https://github.com/allenai/OLMo

primary_backend: olmo

olmo:
  model: olmo2:13b                  # change to olmo2:7b for lighter hardware
  url: http://localhost:11434       # change to GPU server URL for production
  timeout_s: 120                    # increase for longer briefs on slow hardware
  temperature: 0.1                  # low temperature → deterministic YAML output

# ── Tier 2: Static YAML Seed Library ──────────────────────────────────────────
#
# Pre-built story libraries for each domain archetype.
# Domain is auto-detected from the brief by keyword matching.
# Edit config/seed_library.yaml to add or refine archetypes.

yaml_fallback:
  enabled: true
  seed_library_path: config/seed_library.yaml

# ── Tier 3: Anthropic Claude ───────────────────────────────────────────────────
#
# Last resort — used only when both Tier 1 and Tier 2 fail.
# Requires: export ANTHROPIC_API_KEY=sk-ant-...
# Cost: ~$0.01-0.05 per ingestion on Haiku; ~$0.04-0.10 on Sonnet.
#
# NOTE FOR RESEARCHERS:
#   Results generated by this tier are NOT open-source reproducible.
#   Any published dataset must be generated exclusively via Tier 1 (OLMo 2).
#   The _backend field in the output YAML identifies which tier was used.

anthropic_fallback:
  enabled: true
  model: claude-haiku-4-5-20251001  # cheapest; sufficient for story extraction
  # model: claude-sonnet-4-6        # higher quality; use for complex briefs